<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEN Result</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            /* The URL to your image */
            background-image: url('/static/Gemini_Generated_Image_ucryiucryiucryiu.png');
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat; 
            background-attachment: fixed; 
            min-height: 100vh;
        }
        
        /* Custom Lichess Dark */
        .bg-lichess { background-color: #262421; }
        .hover-bg-lichess:hover { background-color: #383633; }
    </style>
</head>
<body class="flex justify-center items-center">

    <div class="bg-white/95 backdrop-blur-sm shadow-2xl rounded-2xl p-8 w-full max-w-3xl border border-gray-200">
        
        <h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">Analysis Complete</h1>
        <p class="text-gray-500 text-center mb-8">Here is the generated FEN code from your image</p>

        <div class="relative group mb-8">
            <div class="flex items-center bg-gray-100 border-2 border-gray-300 rounded-xl overflow-hidden focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-200 transition-all">
                
                <input type="text" 
                       id="fen-input" 
                       value="{{ fen }}" 
                       readonly
                       class="w-full bg-transparent border-none text-gray-800 font-mono text-xl p-4 focus:outline-none"
                       onclick="this.select();">

                <button onclick="copyToClipboard()" 
                        class="flex items-center gap-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-4 px-6 border-l border-gray-300 transition-colors h-full"
                        title="Copy to Clipboard">
                    
                    <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                    
                    <svg id="check-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </button>
            </div>
            
            <p id="copy-feedback" class="absolute -bottom-6 right-0 text-sm text-green-600 font-semibold opacity-0 transition-opacity">
                Copied to clipboard!
            </p>
        </div>

        <div class="flex flex-col gap-4">

            <a href="https://lichess.org/editor/{{ fen }}" target="_blank" class="block group">
                <button class="w-full bg-lichess hover-bg-lichess text-white text-lg font-bold py-3 px-6 rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-0.5 transition-all flex justify-between items-center">
                    
                    <span class="w-8"></span> 
                    
                    <span>Open in Lichess</span>

                    <img src="/static/Lichess_Logo.png" alt="Lichess" class="h-8 w-auto object-contain filter brightness-0 invert opacity-90 group-hover:opacity-100 transition-opacity">
                </button>
            </a>

        </div>
        
        <div class="mt-6 text-center">
            <a href="/" class="text-gray-500 hover:text-gray-700 hover:underline text-sm font-medium">Upload another image</a>
        </div>

    </div>

    <script>
        function copyToClipboard() {
            const fenInput = document.getElementById("fen-input");
            const copyIcon = document.getElementById("copy-icon");
            const checkIcon = document.getElementById("check-icon");
            const feedback = document.getElementById("copy-feedback");

            fenInput.select();
            fenInput.setSelectionRange(0, 99999);

            navigator.clipboard.writeText(fenInput.value).then(() => {
                copyIcon.classList.add("hidden");
                checkIcon.classList.remove("hidden");
                feedback.classList.remove("opacity-0");

                setTimeout(() => {
                    copyIcon.classList.remove("hidden");
                    checkIcon.classList.add("hidden");
                    feedback.classList.add("opacity-0");
                }, 2000);
            });
        }
    </script>
</body>
</html>
